services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chetopia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        for i in $$(seq 1 30); do
          if ollama list > /dev/null 2>&1; then break; fi
          sleep 2
        done
        echo "Pulling models..."
        ollama pull nomic-embed-text 2>/dev/null || true
        ollama pull qwen2.5:3b 2>/dev/null || true
        ollama pull llava-phi3:3.8b 2>/dev/null || true
        echo "Models ready."
        wait

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OLLAMA_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      VISION_MODEL: ${VISION_MODEL:-llava-phi3:3.8b}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-ollama}
      JINA_API_KEY: ${JINA_API_KEY}
      TTS_PROVIDER: ${TTS_PROVIDER:-kokoro}
      SIMILARITY_THRESHOLD: ${SIMILARITY_THRESHOLD:-0.45}
      TOP_K: ${TOP_K:-5}
      DJANGO_SECRET_KEY: ${SECRET_KEY:-django-insecure-your-secret-key-here}
      UPLOAD_DIR: /data/uploads
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_USER_KEY: ${REDIS_USER_KEY}
      REDIS_ACCOUNT_KEY: ${REDIS_ACCOUNT_KEY}
    volumes:
      - ./backend/app:/app/app
      - uploads:/data/uploads
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
  uploads:
  whisper_cache:
