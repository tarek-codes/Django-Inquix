services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: inquix
      POSTGRES_USER: inquix
      POSTGRES_PASSWORD: inquix
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inquix"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        for i in $$(seq 1 30); do
          if ollama list > /dev/null 2>&1; then break; fi
          sleep 2
        done
        echo "Pulling models..."
        ollama pull nomic-embed-text 2>/dev/null || true
        ollama pull qwen2.5:3b 2>/dev/null || true
        ollama pull llava-phi3:3.8b 2>/dev/null || true
        echo "Models ready."
        wait

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://inquix:inquix@db:5432/inquix
      OLLAMA_URL: http://ollama:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-jina}
      JINA_API_KEY: ${JINA_API_KEY}
      VISION_MODEL: ${VISION_MODEL:-llava-phi3:3.8b}
      UPLOAD_DIR: /data/uploads
    volumes:
      - ./backend/app:/app/app
      - uploads:/data/uploads
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
  uploads:
  whisper_cache:
